---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: reid-deployment
  namespace: reid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reid
  template:
    metadata:
      labels:
        app: reid
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      volumes:
        - name: reid-volume
          persistentVolumeClaim:
            claimName: pvc-reid
      containers:
        - name: reid
          image: ghcr.io/tailscale/tailscale:stable
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-auth
                  key: ts_auth
            - name: TS_HOSTNAME
              value: k8s-backup
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: "true"
            - name: TS_SSH
              value: "true"
          volumeMounts:
            - name: reid-volume
              mountPath: /data
